<!doctype html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>看见更多路｜世界信息差图谱</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      /* Ensure body doesn't stretch or have dark blocks */
      html, body {
        background-color: #f8f9fa;
        color: #191b22;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      /* Custom styles for cards */
      .opportunity-card {
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.04);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .opportunity-card:hover {
        transform: scale(1.02);
        box-shadow: 0px 12px 32px rgba(0, 0, 0, 0.08);
      }
      .hero-gradient {
        background: radial-gradient(circle at 70% 30%, rgba(0, 88, 190, 0.05) 0%, rgba(248, 249, 250, 0) 70%);
      }
      .glass-nav {
        backdrop-filter: blur(8px);
        background-color: rgba(248, 249, 250, 0.82);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
